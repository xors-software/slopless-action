name: 'Slopless Security Scan'
description: 'AI-powered security scanning for your codebase. Finds vulnerabilities, generates fixes, and comments on PRs.'
author: 'xors-software'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  license-key:
    description: 'Slopless license key (from https://slopless.work)'
    required: true
  api-url:
    description: 'Slopless API URL (override for self-hosted)'
    required: false
    default: 'https://api.slopless.work'
  path:
    description: 'Path to scan (relative to repo root)'
    required: false
    default: '.'
  fail-on-critical:
    description: 'Fail the workflow if CRITICAL vulnerabilities are found'
    required: false
    default: 'true'
  fail-on-high:
    description: 'Fail the workflow if HIGH vulnerabilities are found'
    required: false
    default: 'false'
  auto-fix:
    description: 'Generate fix suggestions for vulnerabilities'
    required: false
    default: 'true'
  cross-validate:
    description: 'Cross-validate HIGH/CRITICAL findings to reduce false positives'
    required: false
    default: 'true'
  comment-on-pr:
    description: 'Post scan results as a PR comment'
    required: false
    default: 'true'
  scan-timeout:
    description: 'Max seconds to wait for the hosted API to return scan results. Large repos with Manwe deep passes can take 15-25 min; default 1800s (30 min).'
    required: false
    default: '1800'
  app-id:
    description: |
      GitHub App ID for the Slopless bot. When set alongside `app-private-key`,
      PR comments are posted as `slopless[bot]` instead of `github-actions[bot]`.
      Create the App at https://github.com/organizations/<org>/settings/apps/new
      with Pull requests: Read & write + Issues: Read & write permissions.
    required: false
    default: ''
  app-private-key:
    description: |
      Private key (.pem contents) for the Slopless GitHub App. Pair with `app-id`.
      Store as a repository secret (e.g. SLOPLESS_APP_PRIVATE_KEY) and pass it
      from your workflow via secrets.SLOPLESS_APP_PRIVATE_KEY.
    required: false
    default: ''

outputs:
  report:
    description: 'Path to the scan report file'
    value: ${{ steps.scan.outputs.report }}
  total-vulnerabilities:
    description: 'Total number of vulnerabilities found'
    value: ${{ steps.scan.outputs.total }}
  critical-count:
    description: 'Number of CRITICAL vulnerabilities'
    value: ${{ steps.scan.outputs.critical }}
  high-count:
    description: 'Number of HIGH vulnerabilities'
    value: ${{ steps.scan.outputs.high }}
  exit-code:
    description: 'Exit code (0 = pass, 1 = fail)'
    value: ${{ steps.scan.outputs.exit_code }}

runs:
  using: 'composite'
  steps:
    - name: Run Slopless Scan
      id: scan
      shell: bash
      env:
        SLOPLESS_LICENSE_KEY: ${{ inputs.license-key }}
        SLOPLESS_API_URL: ${{ inputs.api-url }}
        SCAN_PATH: ${{ inputs.path }}
        AUTO_FIX: ${{ inputs.auto-fix }}
        CROSS_VALIDATE: ${{ inputs.cross-validate }}
        SCAN_TIMEOUT: ${{ inputs.scan-timeout }}
        # Passed through so entrypoint.sh can auto-select pr-review vs full-scan
        # based on the event. PR_NUMBER is only set on pull_request events.
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        bash "${{ github.action_path }}/entrypoint.sh"

    # Mint an installation token for the Slopless GitHub App if both app-id
    # and app-private-key are provided. When the pair is missing this step
    # is a no-op and the comment step falls back to GITHUB_TOKEN (posts as
    # github-actions[bot] — old behavior).
    - name: Generate Slopless App token
      id: app-token
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' && inputs.app-id != '' && inputs.app-private-key != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        # When the app-token step ran, use its token so the comment is posted
        # as slopless[bot]. Otherwise fall back to the runner's GITHUB_TOKEN.
        github-token: ${{ steps.app-token.outputs.token || github.token }}
        script: |
          const fs = require('fs');
          const reportPath = '${{ steps.scan.outputs.report }}';

          if (!reportPath || !fs.existsSync(reportPath)) {
            console.log('No report file found, skipping PR comment');
            return;
          }

          // entrypoint.sh now writes a fully-rendered markdown report including
          // the scan_digest block (scope + confidence + coverage). Use it as-is
          // so the PR comment stays consistent with the CLI/web report.
          const body = fs.readFileSync(reportPath, 'utf8') +
            '\n---\n*Powered by [Slopless](https://slopless.work)*';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          // Match both the old and new comment headers so we replace the same
          // bot comment in-place rather than stacking new ones on top.
          const botComment = comments.find(c =>
            c.body.includes('## Slopless Security Scan') ||
            c.body.includes('# Slopless Security Scan') ||
            c.body.includes('# Security Vulnerability Report')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }

    - name: Check thresholds
      if: always()
      shell: bash
      run: |
        critical="${{ steps.scan.outputs.critical }}"
        high="${{ steps.scan.outputs.high }}"

        if [[ "${{ inputs.fail-on-critical }}" == "true" && "${critical:-0}" -gt 0 ]]; then
          echo "::error::Found ${critical} CRITICAL vulnerabilities"
          exit 1
        fi

        if [[ "${{ inputs.fail-on-high }}" == "true" && "${high:-0}" -gt 0 ]]; then
          echo "::error::Found ${high} HIGH vulnerabilities"
          exit 1
        fi

        echo "Threshold check passed"
